version = 1
name = "codex-frontend-workflow"

[setup]
script = "node ./scripts/bootstrap-workflow.mjs"

[[actions]]
name = "Run"
icon = "run"
command = "pnpm dev --host 127.0.0.1 --port 4173"

[[actions]]
name = "Storybook"
icon = "tool"
command = "pnpm storybook --ci --port 6006"

[[actions]]
name = "Typecheck"
icon = "tool"
command = "pnpm run typecheck"

[[actions]]
name = "Doctor"
icon = "tool"
command = "pnpm run workflow:doctor"

[[actions]]
name = "Build"
icon = "tool"
command = "pnpm run build"

[[actions]]
name = "Test"
icon = "tool"
command = "pnpm run test:e2e"

[[actions]]
name = "Visual"
icon = "tool"
command = "pnpm run test:e2e:visual"

[[actions]]
name = "Performance"
icon = "tool"
command = "pnpm run test:e2e:performance"
